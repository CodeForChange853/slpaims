<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLPA-IMS | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <link rel="stylesheet" href="assets/css/custom.css">
</head>

<body class="bg-stone-100 min-h-screen">
    <script src="assets/js/api.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script>renderSidebar("dashboard"); renderConfirmModal();</script>

    <div class="ml-64 flex flex-col min-h-screen">
        <!-- Topbar -->
        <div
            class="bg-white border-b border-gray-200 px-8 h-16 flex items-center justify-between sticky top-0 z-30 no-print">
            <div>
                <h1 class="text-xl font-bold text-gray-800" style="font-family:Georgia,serif">Dashboard</h1>
                <p class="text-xs text-gray-400">Overview of your inventory system</p>
            </div>
            <div id="topbar-date" class="text-sm text-gray-400"></div>
        </div>

        <div class="p-8 page-in">
            <!-- Welcome -->
            <div class="rounded-xl px-8 py-6 mb-7 flex items-center justify-between relative overflow-hidden"
                style="background:linear-gradient(135deg,#14532d,#15803d)">
                <div>
                    <h2 class="text-2xl font-bold text-white" style="font-family:Georgia,serif">Good day, Administrator!
                        👋</h2>
                    <p class="text-green-200 text-sm mt-1">Here's what's happening in your inventory today.</p>
                </div>
                <div class="text-8xl opacity-10 absolute right-6 bottom-[-10px] select-none">🌿</div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-4 gap-5 mb-7" id="stats-grid">
                <div class="bg-white rounded-xl p-6 border border-gray-100 shadow-sm animate-pulse h-32"></div>
                <div class="bg-white rounded-xl p-6 border border-gray-100 shadow-sm animate-pulse h-32"></div>
                <div class="bg-white rounded-xl p-6 border border-gray-100 shadow-sm animate-pulse h-32"></div>
                <div class="bg-white rounded-xl p-6 border border-gray-100 shadow-sm animate-pulse h-32"></div>
            </div>

            <!-- Main grid -->
            <div class="grid grid-cols-3 gap-6">
                <!-- Recent Transactions -->
                <div class="col-span-2 bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-100">
                        <h3 class="font-semibold text-gray-800">Recent Transactions</h3>
                        <p class="text-xs text-gray-400 mt-0.5">Latest stock movements</p>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="bg-stone-50 text-xs text-gray-400 uppercase tracking-wide">
                                    <th class="px-6 py-3 text-left">Product</th>
                                    <th class="px-4 py-3 text-left">Type</th>
                                    <th class="px-4 py-3 text-left">Qty</th>
                                    <th class="px-4 py-3 text-left">Date</th>
                                    <th class="px-4 py-3 text-left">Note</th>
                                </tr>
                            </thead>
                            <tbody id="tx-table">
                                <tr>
                                    <td colspan="5" class="px-6 py-8 text-center text-gray-400">Loading…</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Sidebar widgets -->
                <div class="flex flex-col gap-5">
                    <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                        <div class="px-5 py-4 border-b border-gray-100">
                            <h3 class="font-semibold text-gray-800 text-sm">Stock by Category</h3>
                        </div>
                        <div class="p-4" style="height:210px"><canvas id="chart-donut"></canvas></div>
                    </div>
                    <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                        <div class="px-5 py-4 border-b border-gray-100">
                            <h3 class="font-semibold text-gray-800 text-sm">⚠️ Low Stock Items</h3>
                        </div>
                        <div id="low-stock-list" class="divide-y divide-gray-50 max-h-52 overflow-y-auto">
                            <div class="px-5 py-4 text-center text-gray-400 text-sm">Loading…</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("topbar-date").textContent =
            new Date().toLocaleDateString("en-PH", { weekday: "short", month: "long", day: "numeric", year: "numeric" });

        async function loadDashboard() {
            const [summary, inventory, txHistory] = await Promise.all([
                api.get("/reports/summary"),
                api.get("/reports/inventory"),
                api.get("/stock/history?limit=8"),
            ]);

            // Stats
            const stats = [
                { label: "Total Products", value: summary.total_products, color: "green", icon: "📦" },
                { label: "Inventory Value", value: formatPHP(summary.total_value), color: "amber", icon: "💰" },
                { label: "Low Stock Items", value: summary.low_stock_count, color: "red", icon: "⚠️" },
                { label: "Total Transactions", value: summary.total_transactions, color: "blue", icon: "🔄" },
            ];
            const colorMap = {
                green: "bg-green-100 text-green-700", amber: "bg-amber-100 text-amber-700",
                red: "bg-red-100 text-red-700", blue: "bg-blue-100 text-blue-700"
            };
            document.getElementById("stats-grid").innerHTML = stats.map(s => `
    <div class="bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:-translate-y-0.5 transition">
      <div class="w-11 h-11 rounded-xl flex items-center justify-center text-xl mb-4 ${colorMap[s.color]}">${s.icon}</div>
      <div class="text-2xl font-bold text-gray-800">${s.value}</div>
      <div class="text-xs text-gray-400 mt-1">${s.label}</div>
    </div>`).join("");

            // Transaction table
            const txHTML = txHistory.length ? txHistory.map(tx => `
    <tr class="border-b border-gray-50">
      <td class="px-6 py-3 font-medium text-gray-700 max-w-[160px] truncate">${tx.product_name || "—"}</td>
      <td class="px-4 py-3">${tx.type === "in"
                    ? '<span class="px-2 py-0.5 text-xs font-semibold rounded-full bg-green-100 text-green-700">📥 In</span>'
                    : '<span class="px-2 py-0.5 text-xs font-semibold rounded-full bg-red-100 text-red-700">📤 Out</span>'}</td>
      <td class="px-4 py-3 font-semibold ${tx.type === "in" ? "text-green-600" : "text-red-600"}">
        ${tx.type === "in" ? "+" : "-"}${tx.quantity}</td>
      <td class="px-4 py-3 text-xs text-gray-400 whitespace-nowrap">${tx.created_at}</td>
      <td class="px-4 py-3 text-xs text-gray-400 max-w-[120px] truncate">${tx.note || "—"}</td>
    </tr>`).join("")
                : `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">No transactions yet.</td></tr>`;
            document.getElementById("tx-table").innerHTML = txHTML;

            // Donut chart
            const cats = inventory.by_category.filter(c => c.total_qty > 0);
            new Chart(document.getElementById("chart-donut"), {
                type: "doughnut",
                data: {
                    labels: cats.map(c => c.category.split("&")[0].trim()),
                    datasets: [{ data: cats.map(c => c.total_qty), backgroundColor: ["#16a34a", "#f59e0b", "#2563eb", "#dc2626", "#7c3aed"], borderWidth: 2, borderColor: "#fff" }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: "65%", plugins: { legend: { position: "bottom", labels: { font: { size: 10 }, padding: 8 } } } }
            });

            // Low stock list
            const low = inventory.items.filter(p => p.status !== "in_stock");
            document.getElementById("low-stock-list").innerHTML = low.length
                ? low.map(p => `
      <div class="px-5 py-3 flex items-center justify-between">
        <div>
          <div class="text-sm font-medium text-gray-700 leading-tight">${p.name}</div>
          <div class="text-xs text-gray-400">${p.category}</div>
        </div>
        <div class="text-right">
          <div class="font-bold text-sm ${p.quantity === 0 ? "text-red-600" : "text-amber-600"}">${p.quantity}</div>
          <div class="text-xs text-gray-400">min: ${p.threshold}</div>
        </div>
      </div>`).join("")
                : `<div class="px-5 py-4 text-center text-sm text-gray-400">✅ All products well-stocked</div>`;
        }

        loadDashboard().catch(console.error);
    </script>
</body>

</html>
