<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLPA-IMS | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/custom.css">
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js" defer></script>
</head>

<body class="min-h-screen flex items-center justify-center"
    style="background:linear-gradient(135deg,#0c2210 0%,#1e4d20 60%,#2d6a2f 100%)">

    <div class="w-full max-w-md mx-4 bg-white rounded-2xl shadow-2xl p-10 page-in">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4"
                style="background:linear-gradient(135deg,#14532d,#22c55e)">🌾</div>
            <h1 class="text-2xl font-bold text-gray-800" style="font-family:Georgia,serif">SLPA-IMS</h1>
            <p class="text-sm text-gray-500 mt-1 leading-snug">
                Napalisan Islanders Sustainable Livelihood<br>Program Association — General Merchandise
            </p>
        </div>

        <div id="error-msg"
            class="hidden mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg text-center">
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1">Username</label>
                <input id="username" type="text" placeholder="Enter username"
                    class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1">Password</label>
                <input id="password" type="password" placeholder="Enter password"
                    class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition">
            </div>
            <button id="login-btn" onclick="doLogin()"
                class="w-full py-3 rounded-lg text-white font-semibold text-sm transition hover:-translate-y-0.5 active:translate-y-0"
                style="background:linear-gradient(135deg,#14532d,#22c55e)">
                Sign In to System
            </button>
        </div>
        <p class="text-center text-xs text-gray-400 mt-5">Created by: <span
                class="text-green-700 font-semibold">SLPA-IMS Technical Team</span></p>
    </div>

</body>

</html>
