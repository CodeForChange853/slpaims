<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLPA-IMS | Stock In / Out</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/custom.css">
</head>

<body class="bg-stone-100 min-h-screen">
    <script src="assets/js/api.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script>renderSidebar("stock"); renderConfirmModal();</script>

    <div class="ml-64 flex flex-col min-h-screen">
        <div class="bg-white border-b border-gray-200 px-8 h-16 flex items-center sticky top-0 z-30 no-print">
            <div>
                <h1 class="text-xl font-bold text-gray-800" style="font-family:Georgia,serif">Stock In / Out</h1>
                <p class="text-xs text-gray-400">Record inventory movements</p>
            </div>
        </div>

        <div class="p-8 page-in">
            <div class="grid gap-6" style="grid-template-columns:380px 1fr">
                <!-- Form -->
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden self-start">
                    <div class="px-6 py-4 border-b border-gray-100 font-semibold text-gray-800">Record Transaction</div>
                    <div class="px-6 py-5 space-y-4">
                        <div>
                            <label class="label">Transaction Type</label>
                            <select id="tx-type" onchange="updatePreview()" class="field">
                                <option value="in">📥 Stock In — Restock / Purchase</option>
                                <option value="out">📤 Stock Out — Sale / Usage</option>
                            </select>
                        </div>
                        <div>
                            <label class="label">Product</label>
                            <select id="tx-product" onchange="updatePreview()" class="field">
                                <option value="">Select product…</option>
                            </select>
                        </div>
                        <div>
                            <label class="label">Quantity</label>
                            <input id="tx-qty" type="number" min="1" value="1" oninput="updatePreview()" class="field"
                                placeholder="Enter quantity">
                        </div>
                        <div>
                            <label class="label">Note / Reference</label>
                            <input id="tx-note" type="text" class="field" placeholder="e.g. Delivery from supplier…">
                        </div>
                        <div id="tx-preview"
                            class="hidden px-4 py-3 rounded-lg bg-green-50 border border-green-200 text-sm text-green-800">
                        </div>
                        <button onclick="submitTransaction()"
                            class="w-full py-3 rounded-lg text-white font-semibold text-sm transition hover:-translate-y-0.5"
                            style="background:linear-gradient(135deg,#14532d,#16a34a)">✔ Submit Transaction</button>
                    </div>
                </div>

                <!-- History -->
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                        <div>
                            <div class="font-semibold text-gray-800">Transaction History</div>
                            <div class="text-xs text-gray-400 mt-0.5">All recorded stock movements</div>
                        </div>
                        <select id="tx-filter" onchange="loadHistory()"
                            class="px-3 py-1.5 border border-gray-200 rounded-lg text-xs bg-white focus:outline-none focus:ring-2 focus:ring-green-500">
                            <option value="">All Types</option>
                            <option value="in">Stock In</option>
                            <option value="out">Stock Out</option>
                        </select>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr
                                    class="bg-stone-50 text-xs text-gray-400 uppercase tracking-wide border-b border-gray-100">
                                    <th class="px-5 py-3 text-left">Date &amp; Time</th>
                                    <th class="px-4 py-3 text-left">Product</th>
                                    <th class="px-4 py-3 text-left">Type</th>
                                    <th class="px-4 py-3 text-left">Qty</th>
                                    <th class="px-4 py-3 text-left">Stock After</th>
                                    <th class="px-4 py-3 text-left">Note</th>
                                </tr>
                            </thead>
                            <tbody id="tx-table">
                                <tr>
                                    <td colspan="6" class="px-6 py-10 text-center text-gray-400">Loading…</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 4px;
        }

        .field {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.88rem;
            color: #111827;
            outline: none;
            transition: border-color .15s;
        }

        .field:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, .1);
        }
    </style>
    <script src="assets/js/stock.js"></script>
</body>

</html>
