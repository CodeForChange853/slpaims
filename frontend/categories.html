<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLPA-IMS | Categories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/custom.css">
</head>

<body class="bg-stone-100 min-h-screen">
    <script src="assets/js/api.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script>renderSidebar("categories"); renderConfirmModal();</script>

    <div class="ml-64 flex flex-col min-h-screen">
        <div
            class="bg-white border-b border-gray-200 px-8 h-16 flex items-center justify-between sticky top-0 z-30 no-print">
            <div>
                <h1 class="text-xl font-bold text-gray-800" style="font-family:Georgia,serif">Categories</h1>
                <p class="text-xs text-gray-400">Organize product categories</p>
            </div>
            <button onclick="openModal()"
                class="flex items-center gap-2 px-4 py-2 rounded-lg text-white text-sm font-semibold transition hover:-translate-y-0.5"
                style="background:linear-gradient(135deg,#14532d,#16a34a)">＋ Add Category</button>
        </div>

        <div class="p-8 page-in">
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr
                                class="bg-stone-50 text-xs text-gray-400 uppercase tracking-wide border-b border-gray-100">
                                <th class="px-6 py-3 text-left">#</th>
                                <th class="px-4 py-3 text-left">Category Name</th>
                                <th class="px-4 py-3 text-left">Description</th>
                                <th class="px-4 py-3 text-left">Products</th>
                                <th class="px-4 py-3 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="cat-table">
                            <tr>
                                <td colspan="5" class="px-6 py-10 text-center text-gray-400">Loading…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- CATEGORY MODAL -->
    <div id="cat-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center modal-backdrop bg-black bg-opacity-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4">
            <div class="flex items-center justify-between px-7 pt-6 pb-0">
                <h2 id="modal-title" class="text-lg font-bold text-gray-800" style="font-family:Georgia,serif">Add
                    Category</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl p-1">✕</button>
            </div>
            <div class="px-7 py-5 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1">Category Name
                        *</label>
                    <input id="fc-name" type="text"
                        class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                        placeholder="e.g. Grains &amp; Cereals">
                    <div id="err-name" class="text-xs text-red-500 mt-1 hidden"></div>
                </div>
                <div>
                    <label
                        class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1">Description</label>
                    <textarea id="fc-desc" rows="3"
                        class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                        placeholder="Describe what products belong here…"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-3 px-7 pb-6">
                <button onclick="closeModal()"
                    class="px-5 py-2 rounded-lg border border-gray-200 text-sm text-gray-600 hover:bg-gray-50 transition">Cancel</button>
                <button onclick="saveCategory()"
                    class="px-5 py-2 rounded-lg text-white text-sm font-semibold transition hover:-translate-y-0.5"
                    style="background:linear-gradient(135deg,#14532d,#16a34a)">💾 Save</button>
            </div>
        </div>
    </div>

    <script src="assets/js/categories.js"></script>
</body>

</html>
